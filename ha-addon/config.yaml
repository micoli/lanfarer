name: Lanfarer
version: "1.5.0"
slug: lanfarer
description: Web GUI for managing routers on your local network
url: https://github.com/micoli/lanfarer
arch:
  - aarch64
  - amd64
startup: application
boot: auto

ingress: true
ingress_port: 5176
panel_icon: mdi:router-network

host_network: true

ports:
  "5176/tcp": 5176
ports_description:
  "5176/tcp": Web interface

options:
  verbose: false
  router_config: ""

schema:
  verbose: bool
  router_config: str

watchdog: http://[HOST]:[PORT:5176]/__health
