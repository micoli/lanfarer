openapi: "3.1.0"
info:
  title: fast5688b-gui server API
  version: "2.0.0"
  description: |
    API exposée par le serveur Node.js fast5688b.
    Toutes les routes plugin suivent le schéma :
      /devices/api-proxy/{type}-proxy/{routerId}/{resource}

servers:
  - url: http://localhost:5176

paths:

  # ── Routes propres du serveur ──────────────────────────────────────────────

  /__health:
    get:
      operationId: getHealth
      summary: État du serveur et de la session BBox
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /__check-ip:
    get:
      operationId: checkIp
      summary: Vérifie si une IP est joignable et résout son adresse MAC
      parameters:
        - name: ip
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{1,3}(\.\d{1,3}){3}$'
            example: "192.168.1.10"
      responses:
        "200":
          description: Résultat du ping et de l'ARP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIpResponse"
        "400":
          description: Format d'IP invalide
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string

  /__scan:
    get:
      operationId: scanNetwork
      summary: Flux SSE de scan réseau
      description: |
        Retourne un flux Server-Sent Events. Événements émis :
        - `progress` — avancement du scan
        - `host` — hôte découvert (ping + MAC + vendor)
        - `host-detail` — détails d'un hôte (ports, ping stats, mDNS, SMB)
        - `done` — fin du scan
        - `error` — erreur fatale
      parameters:
        - name: subnet
          in: query
          required: false
          description: CIDR à scanner (ex. 192.168.1.0/24). Détecté automatiquement si absent.
          schema:
            type: string
            example: "192.168.1.0/24"
      responses:
        "200":
          description: Flux SSE
          content:
            text/event-stream:
              schema:
                type: string
              x-sse-events:
                progress:
                  schema:
                    $ref: "#/components/schemas/ScanProgress"
                host:
                  schema:
                    $ref: "#/components/schemas/ScanHost"
                host-detail:
                  schema:
                    $ref: "#/components/schemas/HostDetail"
                done:
                  schema:
                    type: object
                error:
                  schema:
                    type: object
                    properties:
                      message:
                        type: string

  /__config/routers:
    get:
      operationId: getConfigRouters
      summary: Liste tous les routeurs configurés (tous types)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouterEntry"

  # ── Cudy plugin ────────────────────────────────────────────────────────────

  /devices/api-proxy/cudy-proxy/status:
    get:
      operationId: getCudyStatus
      summary: Liste des routeurs Cudy configurés
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [configured, routers]
                properties:
                  configured:
                    type: integer
                  routers:
                    type: array
                    items:
                      type: object
                      required: [name, ip]
                      properties:
                        name: { type: string }
                        ip: { type: string }

  /devices/api-proxy/cudy-proxy/{routerId}/wireless:
    get:
      operationId: getCudyWireless
      summary: Clients Wi-Fi connectés à un AP Cudy (contrat commun WirelessData)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirelessData"
        "404":
          description: Routeur introuvable

  /devices/api-proxy/cudy-proxy/{routerId}/bandwidth:
    get:
      operationId: getCudyBandwidth
      summary: Débit Wi-Fi des interfaces ra0 (2.4 GHz) et rai0 (5 GHz)
      description: |
        Calcule les débits instantanés par dérivation des volumes cumulatifs
        retournés par LuCI (/admin/status/bandwidth).
        Valeurs en kbps.
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CudyBandwidthData"
        "404":
          description: Routeur introuvable

  # ── BBox plugin ────────────────────────────────────────────────────────────

  /devices/api-proxy/bbox-proxy/{routerId}/wireless:
    get:
      operationId: getBboxWireless
      summary: Clients Wi-Fi connectés à la BBox (contrat commun WirelessData)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirelessData"

  /devices/api-proxy/bbox-proxy/{routerId}/hosts:
    get:
      operationId: getHosts
      summary: Appareils connectés au réseau local
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostsData"

  /devices/api-proxy/bbox-proxy/{routerId}/device:
    get:
      operationId: getDevice
      summary: Informations sur le routeur (modèle, firmware, uptime…)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceData"

  /devices/api-proxy/bbox-proxy/{routerId}/wan/stats:
    get:
      operationId: getWanStats
      summary: Statistiques de trafic WAN instantanées (débit, octets cumulés)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WanStatsData"

  /devices/api-proxy/bbox-proxy/{routerId}/wan/graphs:
    get:
      operationId: getWanGraphs
      summary: Historique de débit WAN sur la dernière heure
      description: |
        Agrège les endpoints Bbox /api/v1/graphs/wan/downstream/hour et upstream/hour.
        Chaque point contient un timestamp Unix (secondes) et une valeur en kbps.
        Le premier point de chaque série est le plus ancien.
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WanGraphsData"

  /devices/api-proxy/bbox-proxy/{routerId}/dhcp/config:
    get:
      operationId: getDhcpConfig
      summary: Configuration du serveur DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpConfigData"
    put:
      operationId: updateDhcpConfig
      summary: Met à jour la configuration DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpConfigUpdate"
      responses:
        "204":
          description: OK

  /devices/api-proxy/bbox-proxy/{routerId}/dhcp/clients:
    get:
      operationId: getDhcpClients
      summary: Liste des réservations DHCP statiques
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpClientsData"
    post:
      operationId: createDhcpClient
      summary: Crée une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpClientWrite"
      responses:
        "204":
          description: Créé

  /devices/api-proxy/bbox-proxy/{routerId}/dhcp/clients/{id}:
    put:
      operationId: updateDhcpClient
      summary: Met à jour une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpClientWrite"
      responses:
        "204":
          description: OK
    delete:
      operationId: deleteDhcpClient
      summary: Supprime une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Supprimé

  /devices/api-proxy/bbox-proxy/{routerId}/dhcp/options:
    get:
      operationId: getDhcpOptions
      summary: Options DHCP configurées et disponibles
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpOptionsData"
    post:
      operationId: createDhcpOption
      summary: Crée une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpOptionWrite"
      responses:
        "204":
          description: Créé

  /devices/api-proxy/bbox-proxy/{routerId}/dhcp/options/{id}:
    put:
      operationId: updateDhcpOption
      summary: Met à jour une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpOptionWrite"
      responses:
        "204":
          description: OK
    delete:
      operationId: deleteDhcpOption
      summary: Supprime une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Supprimé

components:
  parameters:
    routerId:
      name: routerId
      in: path
      required: true
      schema:
        type: string
        example: "bbox-main"

  schemas:

    # ── Config ────────────────────────────────────────────────────────────────

    RouterEntry:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: "bbox-main"
        type:
          type: string
          enum: [bbox, cudy]

    # ── Routes propres ─────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [ok, hasSession, target]
      properties:
        ok:
          type: boolean
        hasSession:
          type: boolean
        target:
          type: string
          example: "https://mabbox.bytel.fr"

    CheckIpResponse:
      type: object
      required: [reachable, mac]
      properties:
        reachable:
          type: boolean
        mac:
          type: ["string", "null"]

    ScanProgress:
      type: object
      required: [done, total]
      properties:
        done:
          type: integer
        total:
          type: integer

    ScanHost:
      type: object
      required: [ip, mac, hostname, vendor, ping]
      properties:
        ip:
          type: string
        mac:
          type: string
        hostname:
          type: string
        vendor:
          type: string
        ping:
          type: boolean

    HostDetail:
      type: object
      required: [ip, openPorts, mdnsName, smbName, smbDomain]
      properties:
        ip:
          type: string
        pingStats:
          oneOf:
            - type: "null"
            - type: object
              required: [min, avg, max]
              properties:
                min:
                  type: number
                avg:
                  type: number
                max:
                  type: number
        openPorts:
          type: array
          items:
            type: integer
        mdnsName:
          type: string
        smbName:
          type: string
        smbDomain:
          type: string

    # ── Cross-plugin: wireless ─────────────────────────────────────────────────

    WirelessClient:
      type: object
      required: [mac, signal_dbm, tx_kbps, rx_kbps, inactive_ms]
      properties:
        mac:
          type: string
        signal_dbm:
          type: integer
          description: Signal strength in dBm (negative)
        tx_kbps:
          type: number
          description: Transmit rate in kbps
        rx_kbps:
          type: number
          description: Receive rate in kbps
        inactive_ms:
          type: integer
          description: Time since last activity in milliseconds

    AccessPoint:
      type: object
      required: [ssid, band, channel, clients]
      properties:
        ssid:
          type: string
        band:
          type: string
          enum: ["2.4G", "5G"]
        channel:
          type: integer
        clients:
          type: array
          items:
            $ref: "#/components/schemas/WirelessClient"

    WirelessData:
      type: object
      required: [online, accessPoints]
      properties:
        online:
          type: boolean
        accessPoints:
          type: array
          items:
            $ref: "#/components/schemas/AccessPoint"

    # ── Cross-plugin: host list ────────────────────────────────────────────────

    Host:
      type: object
      required: [mac, ip, hostname, active]
      properties:
        mac:
          type: string
        ip:
          type: string
        ip6:
          type: string
        hostname:
          type: string
        active:
          type: boolean
        type:
          type: string
        lastseen:
          type: integer
          description: Unix timestamp (seconds)

    HostsData:
      type: object
      required: [hosts]
      properties:
        hosts:
          type: array
          items:
            $ref: "#/components/schemas/Host"

    # ── BBox device / WAN ──────────────────────────────────────────────────────

    DeviceData:
      type: object
      required: [modelname, serialnumber, firmware, firmwareDate, uptime, boots, using]
      properties:
        modelname:
          type: string
        serialnumber:
          type: string
        firmware:
          type: string
        firmwareDate:
          type: string
        uptime:
          type: integer
          description: Uptime in seconds
        boots:
          type: integer
        using:
          type: object
          required: [ipv4, ipv6, ftth]
          properties:
            ipv4: { type: boolean }
            ipv6: { type: boolean }
            ftth: { type: boolean }

    WanGraphPoint:
      type: object
      required: [ts, value]
      properties:
        ts:
          type: integer
          description: Unix timestamp (secondes)
        value:
          type: number
          description: Débit en kbps

    WanGraphsData:
      type: object
      required: [down, up]
      properties:
        down:
          type: array
          items:
            $ref: "#/components/schemas/WanGraphPoint"
        up:
          type: array
          items:
            $ref: "#/components/schemas/WanGraphPoint"

    CudyBandwidthPoint:
      type: object
      required: [ts, up, down]
      properties:
        ts:
          type: integer
          description: Unix timestamp (secondes)
        up:
          type: number
          description: Débit montant en kbps
        down:
          type: number
          description: Débit descendant en kbps

    CudyBandwidthData:
      type: object
      required: [ra0, rai0]
      properties:
        ra0:
          description: Interface 2.4 GHz
          type: array
          items:
            $ref: "#/components/schemas/CudyBandwidthPoint"
        rai0:
          description: Interface 5 GHz
          type: array
          items:
            $ref: "#/components/schemas/CudyBandwidthPoint"

    WanStatsSide:
      type: object
      required: [bytes, bandwidth, contractualBandwidth, occupation]
      properties:
        bytes: { type: integer }
        bandwidth: { type: number }
        contractualBandwidth: { type: number }
        occupation: { type: number }

    WanStatsData:
      type: object
      required: [rx, tx]
      properties:
        rx:
          $ref: "#/components/schemas/WanStatsSide"
        tx:
          $ref: "#/components/schemas/WanStatsSide"

    # ── BBox DHCP ──────────────────────────────────────────────────────────────

    DhcpClient:
      type: object
      required: [id, enable, hostname, macaddress, ipaddress, ip6address]
      properties:
        id:
          type: integer
        enable:
          type: integer
        hostname:
          type: string
        macaddress:
          type: string
        ipaddress:
          type: string
        ip6address:
          type: string

    DhcpClientWrite:
      type: object
      required: [enable, macaddress, ipaddress, ip6address, hostname]
      properties:
        enable:
          type: integer
        macaddress:
          type: string
        ipaddress:
          type: string
        ip6address:
          type: string
        hostname:
          type: string

    DhcpConfig:
      type: object
      required: [enable, minaddress, maxaddress, leasetime]
      properties:
        enable:
          type: integer
        minaddress:
          type: string
        maxaddress:
          type: string
        leasetime:
          type: integer

    DhcpConfigUpdate:
      type: object
      properties:
        enable:
          type: integer
        minaddress:
          type: string
        maxaddress:
          type: string
        leasetime:
          type: integer

    DhcpClientsData:
      type: object
      required: [clients]
      properties:
        clients:
          type: array
          items:
            $ref: "#/components/schemas/DhcpClient"

    DhcpConfigData:
      type: object
      required: [config]
      properties:
        config:
          $ref: "#/components/schemas/DhcpConfig"

    DhcpOption:
      type: object
      required: [id, option, value]
      properties:
        id:
          type: integer
        option:
          type: integer
        value:
          type: string

    DhcpOptionWrite:
      type: object
      required: [option, value]
      properties:
        option:
          type: integer
        value:
          type: string

    DhcpOptionCapability:
      type: object
      required: [id, type, description]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [INT, IP, STRING, BOOL]
        description:
          type: string

    DhcpOptionsData:
      type: object
      required: [options, optionsstatic, capabilities]
      properties:
        options:
          type: array
          items:
            $ref: "#/components/schemas/DhcpOption"
        optionsstatic:
          type: array
          items:
            $ref: "#/components/schemas/DhcpOption"
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/DhcpOptionCapability"
