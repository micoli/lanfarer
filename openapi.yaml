openapi: 3.0.0
paths:
  /__health:
    get:
      operationId: HealthController_health
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
      summary: État du serveur et de la session BBox
      tags:
        - server
  /__auth/login:
    post:
      operationId: AuthController_loginRoute
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Corps de requête invalide
        "401":
          description: Identifiants incorrects
      summary: Authentification par login/mot de passe
      tags: &a1
        - auth
  /__auth/logout:
    post:
      operationId: AuthController_logoutRoute
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                properties:
                  ok:
                    type: boolean
      security:
        - session: []
      summary: Déconnexion — invalide le cookie de session
      tags: *a1
  /__auth/me:
    get:
      operationId: AuthController_meRoute
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Non authentifié
      security:
        - session: []
      summary: Identité de l'utilisateur courant
      tags: *a1
  /__scan:
    get:
      description: |-
        Retourne un flux Server-Sent Events.
        - `progress` — `{ done, total }` avancement
        - `host` — hôte découvert (ping + MAC + vendor)
        - `host-detail` — détails (ports ouverts, mDNS, SMB)
        - `done` — fin du scan
        - `error` — erreur fatale
      operationId: ScanController_scan
      parameters:
        - name: subnet
          required: false
          in: query
          description: CIDR à scanner (ex. 192.168.1.0/24). Détecté automatiquement si absent.
          schema:
            example: 192.168.1.0/24
      responses:
        "200":
          description: Flux SSE text/event-stream
      security:
        - session: []
      summary: Scan réseau — flux SSE
      tags:
        - server
  /__ping:
    get:
      description: |-
        Envoie des pings ICMP en boucle. Événement `ping` émis à chaque cycle :
        `{ ip: string, rtt: number | null }[]` — null si l'hôte est injoignable.
      operationId: PingController_ping
      parameters:
        - name: ips
          required: true
          in: query
          description: Liste d'IP séparées par des virgules
          schema:
            example: 192.168.1.1,192.168.1.10
      responses:
        "200":
          description: Flux SSE text/event-stream
        "400":
          description: Aucune IP fournie
      security:
        - session: []
      summary: Ping continu — flux SSE
      tags:
        - server
  /__hosts:
    get:
      description: |-
        Retourne un flux Server-Sent Events.
        - `progress` — `{ pct: number, label: string }` avancement
        - `result` — `{ hosts: Host[] }` résultat final
      operationId: HostsController_hosts
      parameters: []
      responses:
        "200":
          description: Flux SSE text/event-stream
      security:
        - session: []
      summary: Flux SSE d'hôtes réseau agrégés depuis tous les plugins
      tags:
        - server
  /__map/topology:
    get:
      description: |-
        Agrège les données Wi-Fi de tous les plugins configurés (bbox, cudy, airport, kuwfi…)
        et retourne une structure normalisée. Les hostnames sont résolus côté serveur.
      operationId: MapController_topology
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapTopology"
      security:
        - session: []
      summary: Topologie réseau agrégée pour la carte
      tags:
        - map
  /__check-ip:
    get:
      operationId: CheckIpController_checkIp
      parameters:
        - name: ip
          required: true
          in: query
          description: Adresse IPv4 à tester
          schema:
            type: string
            pattern: ^\d{1,3}(\.\d{1,3}){3}$
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIpResponse"
        "400":
          description: Format d'IP invalide
      security:
        - session: []
      summary: Vérifie si une IP est joignable et résout son adresse MAC
      tags:
        - server
  /__oui:
    get:
      operationId: OuiController_oui
      parameters:
        - name: mac
          required: true
          in: query
          description: Adresse MAC complète (tous formats acceptés)
          schema:
            example: AA:BB:CC:DD:EE:FF
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OuiResponse"
        "400":
          description: Paramètre mac manquant ou invalide
      security:
        - session: []
      summary: Résolution du fabricant depuis les 3 premiers octets d'une adresse MAC
      tags:
        - server
  /__config/ui:
    get:
      operationId: RouterConfigController_uiConfig
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiConfig"
      security: &a2
        - session: []
      summary: Configuration UI (menu latéral, widgets, DHCP)
      tags: &a3
        - config
  /__config/routers:
    get:
      operationId: RouterConfigController_routers
      parameters: []
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouterEntry"
      security: *a2
      summary: Liste tous les routeurs activés dans config.yaml
      tags: *a3
  /__probe:
    get:
      operationId: ProbeController_probe
      parameters:
        - name: ip
          required: true
          in: query
          description: Adresse IPv4 à sonder
          schema:
            example: 192.168.1.10
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbeResult"
        "400":
          description: IP manquante ou invalide
      security:
        - session: []
      summary: Sonde un hôte (ports ouverts, mDNS, SMB, ping stats)
      tags:
        - server
  /devices/api-proxy/bbox/{routerId}/wireless:
    get:
      tags:
        - bbox
      operationId: getBboxWireless
      summary: Clients Wi-Fi connectés à la BBox
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirelessData"
  /devices/api-proxy/bbox/{routerId}/hosts:
    get:
      tags:
        - bbox
      operationId: getBboxHosts
      summary: Appareils connectés au réseau local (bbox)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostsData"
  /devices/api-proxy/bbox/{routerId}/device:
    get:
      tags:
        - bbox
      operationId: getBboxDevice
      summary: Informations sur le routeur BBox (modèle, firmware, uptime…)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceData"
  /devices/api-proxy/bbox/{routerId}/wan/stats:
    get:
      tags:
        - bbox
      operationId: getBboxWanStats
      summary: Statistiques de trafic WAN instantanées
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WanStatsData"
  /devices/api-proxy/bbox/{routerId}/wan/graphs:
    get:
      tags:
        - bbox
      operationId: getBboxWanGraphs
      summary: Historique de débit WAN sur la dernière heure
      description: |
        Agrège les endpoints Bbox downstream/hour et upstream/hour.
        Chaque point contient un timestamp Unix (secondes) et une valeur en kbps.
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WanGraphsData"
  /devices/api-proxy/bbox/{routerId}/dhcp/config:
    get:
      tags:
        - bbox
      operationId: getBboxDhcpConfig
      summary: Configuration du serveur DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpConfigData"
    put:
      tags:
        - bbox
      operationId: updateBboxDhcpConfig
      summary: Met à jour la configuration DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpConfigUpdate"
      responses:
        "204":
          description: OK
  /devices/api-proxy/bbox/{routerId}/dhcp/clients:
    get:
      tags:
        - bbox
      operationId: getBboxDhcpClients
      summary: Liste des réservations DHCP statiques
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpClientsData"
    post:
      tags:
        - bbox
      operationId: createBboxDhcpClient
      summary: Crée une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpClientWrite"
      responses:
        "204":
          description: Créé
  /devices/api-proxy/bbox/{routerId}/dhcp/clients/{id}:
    put:
      tags:
        - bbox
      operationId: updateBboxDhcpClient
      summary: Met à jour une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpClientWrite"
      responses:
        "204":
          description: OK
    delete:
      tags:
        - bbox
      operationId: deleteBboxDhcpClient
      summary: Supprime une réservation DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Supprimé
  /devices/api-proxy/bbox/{routerId}/dhcp/options:
    get:
      tags:
        - bbox
      operationId: getBboxDhcpOptions
      summary: Options DHCP configurées et disponibles
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpOptionsData"
    post:
      tags:
        - bbox
      operationId: createBboxDhcpOption
      summary: Crée une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpOptionWrite"
      responses:
        "204":
          description: Créé
  /devices/api-proxy/bbox/{routerId}/dhcp/options/{id}:
    put:
      tags:
        - bbox
      operationId: updateBboxDhcpOption
      summary: Met à jour une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpOptionWrite"
      responses:
        "204":
          description: OK
    delete:
      tags:
        - bbox
      operationId: deleteBboxDhcpOption
      summary: Supprime une option DHCP
      parameters:
        - $ref: "#/components/parameters/routerId"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Supprimé
  /devices/api-proxy/bbox/{routerId}/wifi-settings:
    get:
      tags:
        - bbox
      operationId: getBboxWifiSettings
      summary: Paramètres Wi-Fi (SSID, mot de passe, bande)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirelessData"
  /devices/api-proxy/cudy/status:
    get:
      tags:
        - cudy
      operationId: getCudyStatus
      summary: Liste des routeurs Cudy configurés
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterStatusResponse"
  /devices/api-proxy/cudy/{routerId}/wireless:
    get:
      tags:
        - cudy
      operationId: getCudyWireless
      summary: Clients Wi-Fi connectés à un AP Cudy
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WirelessData"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/cudy/{routerId}/bandwidth:
    get:
      tags:
        - cudy
      operationId: getCudyBandwidth
      summary: Débit Wi-Fi des interfaces ra0 (2.4 GHz) et rai0 (5 GHz)
      description: |
        Calcule les débits instantanés par dérivation des volumes cumulatifs.
        Valeurs en kbps.
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CudyBandwidthData"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/cudy/{routerId}/devlist:
    get:
      tags:
        - cudy
      operationId: getCudyDevlist
      summary: Liste des appareils connectés via LuCI (iface, ip, mac, débit)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CudyDevlistEntry"
        "404":
          description: Routeur introuvable
        "502":
          description: Login LuCI échoué ou endpoint indisponible
  /devices/api-proxy/airport/status:
    get:
      tags:
        - airport
      operationId: getAirportStatus
      summary: Liste des AirPort configurés
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterStatusResponse"
  /devices/api-proxy/airport/{routerId}/hosts:
    get:
      tags:
        - airport
      operationId: getAirportHosts
      summary: Hôtes connectés à un AirPort (via table ARP ACP)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportRouterDetail"
        "404":
          description: Routeur introuvable
        "500":
          description: Erreur de communication ACP
  /devices/api-proxy/airport/{routerId}/wireless:
    get:
      tags:
        - airport
      operationId: getAirportWireless
      summary: Clients Wi-Fi connectés à un AirPort (données ACP brutes)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportWirelessData"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/airport/{routerId}/wifi-settings:
    get:
      tags:
        - airport
      operationId: getAirportWifiSettings
      summary: Paramètres Wi-Fi de l'AirPort (interfaces ACP)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportWifiSettings"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/airport/{routerId}/device-info:
    get:
      tags:
        - airport
      operationId: getAirportDeviceInfo
      summary: Informations sur l'appareil AirPort (via mDNS/ACP)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirportDeviceInfo"
  /devices/api-proxy/kuwfi/status:
    get:
      tags:
        - kuwfi
      operationId: getKuwfiStatus
      summary: Liste des APs KuWFi configurés
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterStatusResponse"
  /devices/api-proxy/kuwfi/{routerId}:
    get:
      tags:
        - kuwfi
      operationId: getKuwfiRouter
      summary: Données complètes d'un AP KuWFi (accessPoints + clients)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KuwfiRouterResult"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/kuwfi/{routerId}/bandwidth:
    get:
      tags:
        - kuwfi
      operationId: getKuwfiBandwidth
      summary: Débit Wi-Fi par bande (2.4 GHz et 5 GHz) en kbps
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KuwfiBandwidthData"
        "404":
          description: Routeur introuvable
  /devices/api-proxy/nestwifi-proxy/status:
    get:
      tags:
        - nestwifi
      operationId: getNestWifiStatus
      summary: Liste des appareils NestWifi configurés
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouterStatusResponse"
  /devices/api-proxy/nestwifi-proxy/{routerId}:
    get:
      tags:
        - nestwifi
      operationId: getNestWifiRouter
      summary: Hôtes détectés par un AP NestWifi (via ARP local)
      parameters:
        - $ref: "#/components/parameters/routerId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NestWifiRouterResult"
        "404":
          description: Routeur introuvable
info:
  title: fast5688b-gui server API
  description: |-
    API exposée par le serveur Node.js fast5688b.
    Toutes les routes plugin suivent le schéma :
      /devices/api-proxy/{type}-proxy/{routerId}/{resource}
  version: 2.0.0
  contact: {}
tags: []
servers:
  - url: http://localhost:5176
components:
  securitySchemes:
    cookie:
      type: apiKey
      in: cookie
      name: session
  schemas:
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
        hasSession:
          type: boolean
        target:
          type: string
          example: https://mabbox.bytel.fr
      required:
        - ok
        - hasSession
        - target
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: secret
      required:
        - username
        - password
    LoginResponse:
      type: object
      properties:
        ok:
          type: boolean
        username:
          type: string
          example: admin
      required:
        - ok
        - username
    MeResponse:
      type: object
      properties:
        username:
          type: string
          nullable: true
          example: admin
        authEnabled:
          type: boolean
      required:
        - username
        - authEnabled
    MapClient:
      type: object
      properties:
        mac:
          type: string
          example: AA:BB:CC:DD:EE:FF
        hostname:
          type: string
        ip:
          type: string
          example: 192.168.1.10
        signal_dbm:
          type: number
          example: -65
      required:
        - mac
    MapAccessPoint:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        sublabel:
          type: string
        kind:
          type: string
          example: bbox-wifi
        online:
          type: boolean
        clients:
          type: array
          items:
            $ref: "#/components/schemas/MapClient"
      required:
        - id
        - label
        - kind
        - online
        - clients
    MapTopology:
      type: object
      properties:
        accessPoints:
          type: array
          items:
            $ref: "#/components/schemas/MapAccessPoint"
      required:
        - accessPoints
    CheckIpResponse:
      type: object
      properties:
        reachable:
          type: boolean
        mac:
          type: string
          nullable: true
          example: aa:bb:cc:dd:ee:ff
      required:
        - reachable
        - mac
    OuiResponse:
      type: object
      properties:
        vendor:
          type: string
          nullable: true
          example: Apple, Inc.
      required:
        - vendor
    UiMenuItem:
      type: object
      properties:
        id:
          type: string
        router:
          type: string
          example: bbox-main
        children:
          type: array
          items:
            $ref: "#/components/schemas/UiMenuItem"
      required:
        - id
    UiWidget:
      type: object
      properties:
        type:
          type: string
        id:
          type: string
      required:
        - type
        - id
    UiHomeConfig:
      type: object
      properties:
        widgets:
          type: array
          items:
            $ref: "#/components/schemas/UiWidget"
      required:
        - widgets
    UiDhcpConfig:
      type: object
      properties:
        router:
          type: string
      required:
        - router
    UiConfig:
      type: object
      properties:
        menu:
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/UiMenuItem"
        home:
          nullable: true
          type: object
          allOf:
            - $ref: "#/components/schemas/UiHomeConfig"
        dhcp:
          nullable: true
          type: object
          allOf:
            - $ref: "#/components/schemas/UiDhcpConfig"
      required:
        - menu
        - home
        - dhcp
    RouterEntry:
      type: object
      properties:
        name:
          type: string
          example: bbox-main
        type:
          type: string
          example: bbox
        ip:
          type: string
          example: 192.168.1.1
      required:
        - name
        - type
    PingStats:
      type: object
      properties:
        min:
          type: number
        avg:
          type: number
        max:
          type: number
      required:
        - min
        - avg
        - max
    ProbeResult:
      type: object
      properties:
        ip:
          type: string
        pingStats:
          nullable: true
          type: object
